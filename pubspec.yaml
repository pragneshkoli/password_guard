name: password_guard
description: A secure, developer-friendly password hashing library for Dart and Flutter supporting Argon2id, bcrypt, and PBKDF2 with OWASP-recommended defaults.
version: 1.0.0
homepage: https://github.com/pragneshkoli/password_guard
repository: https://github.com/pragneshkoli/password_guard
issue_tracker: https://github.com/pragneshkoli/password_guard/issues

topics:
  - security
  - cryptography
  - authentication
  - password-hashing
  - passwords

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  # Secure hash functions: Argon2id, PBKDF2, bcrypt — pure Dart, all platforms
  # 160/160 pub points, 56K+ downloads
  hashlib: ^2.3.4
  # HMAC / SHA primitives (also used by hashlib internally)
  crypto: ^3.0.3

dev_dependencies:
  test: ^1.24.0
  lints: ^3.0.0
  coverage: ^1.7.0

# No Flutter dependency — works with any Dart runtime
platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:
